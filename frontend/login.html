<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css?v=4" />
  </head>
  <body>
    <div class="app-container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="brand-title h3 m-0">Car Rental - Login</h1>
        <a class="btn btn-outline-primary" href="./register.html">Register</a>
      </div>

      <div class="card card-soft p-4 mx-auto" style="max-width: 460px;">
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
      </div>
      <p id="message" class="mt-3 text-center"></p>
    </div>

    <script src="./js/api.js?v=3"></script>
    <script>
      document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = document.getElementById("message");
        message.textContent = "";

        const formData = new FormData(event.target);
        const payload = {
          email: formData.get("email"),
          password: formData.get("password")
        };

        try {
          const data = await apiFetch("/auth/login", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          localStorage.setItem("token", data.token);

          if (data.user.role === "CUSTOMER") {
            window.location.href = "./cars.html";
          } else {
            window.location.href = "./agency-dashboard.html";
          }
        } catch (error) {
          message.className = "text-danger mt-3 text-center";
          message.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
