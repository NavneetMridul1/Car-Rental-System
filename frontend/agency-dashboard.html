<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agency Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css?v=4" />
  </head>
  <body>
    <div class="app-container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="brand-title h3 m-0">Agency Dashboard</h1>
        <button class="btn btn-danger" type="button" id="logoutBtn">Logout</button>
      </div>

      <div class="row g-3 dashboard-actions">
        <div class="col-md-4">
          <a href="./add-car.html" class="card card-soft dashboard-tile d-block text-decoration-none">
            <h2 class="h5">Add New Car</h2>
            <p>Register a new vehicle for your agency.</p>
            <span class="tile-cta">Open Form</span>
          </a>
        </div>
        <div class="col-md-4">
          <a href="./agency-bookings.html" class="card card-soft dashboard-tile d-block text-decoration-none">
            <h2 class="h5">View Booked Cars</h2>
            <p>See bookings made for your vehicles.</p>
            <span class="tile-cta">View Bookings</span>
          </a>
        </div>
        <div class="col-md-4">
          <a href="./cars.html" class="card card-soft dashboard-tile d-block text-decoration-none">
            <h2 class="h5">Available Cars Page</h2>
            <p>Preview the public car listing page.</p>
            <span class="tile-cta">Open Listing</span>
          </a>
        </div>
      </div>
    </div>
    <script src="./js/auth.js?v=3"></script>
    <script>
      if (getCurrentRole() !== "AGENCY") {
        window.location.href = "./login.html";
      }

      document.getElementById("logoutBtn").addEventListener("click", () => {
        logout();
      });
    </script>
  </body>
</html>
