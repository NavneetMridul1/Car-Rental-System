<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add/Edit Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css?v=4" />
  </head>
  <body>
    <div class="app-container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="brand-title h3 m-0">Add New Car</h1>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="./agency-dashboard.html">Dashboard</a>
          <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="card card-soft p-4 mb-4">
        <form id="carForm" class="row g-3">
          <input type="hidden" id="carId" />
          <div class="col-md-6">
            <label class="form-label">Vehicle Model</label>
            <input class="form-control" id="vehicleModel" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Vehicle Number</label>
            <input class="form-control" id="vehicleNumber" required />
          </div>
          <div class="col-12">
            <label class="form-label">Car Image URL</label>
            <input class="form-control" id="carImageUrl" type="url" placeholder="https://example.com/car.jpg" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Seating Capacity</label>
            <input class="form-control" id="seatingCapacity" type="number" min="1" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Rent Per Day</label>
            <input class="form-control" id="rentPerDay" type="number" min="1" step="0.01" required />
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit" id="submitBtn">Add Car</button>
            <button class="btn btn-outline-secondary d-none" type="button" id="cancelEditBtn">Cancel Edit</button>
          </div>
        </form>
        <p id="message" class="mt-3 mb-0"></p>
      </div>

      <div class="card card-soft p-4">
        <h2 class="h5">Your Cars</h2>
        <div id="myCars" class="mt-3"></div>
      </div>
    </div>

    <script src="./js/api.js?v=2"></script>
    <script src="./js/auth.js?v=2"></script>
    <script>
      if (getCurrentRole() !== "AGENCY") {
        window.location.href = "./login.html";
      }

      document.getElementById("logoutBtn").addEventListener("click", () => {
        logout();
      });

      const userId = getCurrentUserId();
      const message = document.getElementById("message");
      const myCars = document.getElementById("myCars");
      const form = document.getElementById("carForm");
      const carIdInput = document.getElementById("carId");
      const submitBtn = document.getElementById("submitBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");

      function clearForm() {
        form.reset();
        carIdInput.value = "";
        submitBtn.textContent = "Add Car";
        cancelEditBtn.classList.add("d-none");
      }

      function setMessage(text, isError = false) {
        message.className = isError ? "mt-3 mb-0 text-danger" : "mt-3 mb-0 text-success";
        message.textContent = text;
      }

      async function loadMyCars() {
        myCars.innerHTML = "";
        const cars = await apiFetch("/cars");
        const mine = cars.filter((c) => Number(c.agency_id) === Number(userId));

        if (!mine.length) {
          myCars.innerHTML = `<p class="text-muted mb-0">No cars added yet.</p>`;
          return;
        }

        mine.forEach((car) => {
          const row = document.createElement("div");
          row.className = "d-flex justify-content-between align-items-center border rounded p-3 mb-2";
          row.innerHTML = `
            <div>
              <strong>${car.vehicle_model}</strong> (${car.vehicle_number})<br />
              <small class="d-block text-break">Image: ${car.car_image_url || "N/A"}</small>
              <small>Seats: ${car.seating_capacity} | Rent/day: ${Number(car.rent_per_day).toFixed(2)}</small>
            </div>
            <button class="btn btn-outline-primary btn-sm">Edit</button>
          `;
          row.querySelector("button").addEventListener("click", () => {
            carIdInput.value = car.id;
            document.getElementById("vehicleModel").value = car.vehicle_model;
            document.getElementById("vehicleNumber").value = car.vehicle_number;
            document.getElementById("carImageUrl").value = car.car_image_url || "";
            document.getElementById("seatingCapacity").value = car.seating_capacity;
            document.getElementById("rentPerDay").value = car.rent_per_day;
            submitBtn.textContent = "Update Car";
            cancelEditBtn.classList.remove("d-none");
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
          myCars.appendChild(row);
        });
      }

      cancelEditBtn.addEventListener("click", clearForm);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          vehicle_model: document.getElementById("vehicleModel").value,
          vehicle_number: document.getElementById("vehicleNumber").value,
          car_image_url: document.getElementById("carImageUrl").value,
          seating_capacity: Number(document.getElementById("seatingCapacity").value),
          rent_per_day: Number(document.getElementById("rentPerDay").value)
        };

        try {
          if (carIdInput.value) {
            await apiFetch(`/cars/${carIdInput.value}`, {
              method: "PUT",
              headers: getAuthHeaders(),
              body: JSON.stringify(payload)
            });
            setMessage("Car updated successfully.");
          } else {
            await apiFetch("/cars", {
              method: "POST",
              headers: getAuthHeaders(),
              body: JSON.stringify(payload)
            });
            setMessage("Car added successfully.");
          }
          clearForm();
          await loadMyCars();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      loadMyCars().catch((error) => setMessage(error.message, true));
    </script>
  </body>
</html>
