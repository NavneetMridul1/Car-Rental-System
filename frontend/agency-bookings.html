<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agency Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css?v=4" />
  </head>
  <body>
    <div class="app-container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="brand-title h3 m-0">Booked Cars (Agency)</h1>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="./agency-dashboard.html">Dashboard</a>
          <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="card card-soft p-4">
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>Car</th>
                <th>Customer</th>
                <th>Start Date</th>
                <th>Days</th>
                <th>Total Cost</th>
              </tr>
            </thead>
            <tbody id="bookingRows"></tbody>
          </table>
        </div>
        <p id="message" class="mb-0"></p>
      </div>
    </div>

    <script src="./js/api.js?v=2"></script>
    <script src="./js/auth.js?v=2"></script>
    <script>
      if (getCurrentRole() !== "AGENCY") {
        window.location.href = "./login.html";
      }

      document.getElementById("logoutBtn").addEventListener("click", () => {
        logout();
      });

      async function loadBookings() {
        const rowsEl = document.getElementById("bookingRows");
        const msg = document.getElementById("message");
        rowsEl.innerHTML = "";
        msg.textContent = "";

        try {
          const bookings = await apiFetch("/agency/bookings", {
            method: "GET",
            headers: getAuthHeaders()
          });

          if (!bookings.length) {
            msg.className = "text-muted mb-0";
            msg.textContent = "No bookings yet.";
            return;
          }

          bookings.forEach((b) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${b.booking_id}</td>
              <td>${b.vehicle_model} (${b.vehicle_number})</td>
              <td>${b.customer_name}<br /><small>${b.customer_email}</small></td>
              <td>${String(b.start_date).slice(0, 10)}</td>
              <td>${b.number_of_days}</td>
              <td>${Number(b.total_cost).toFixed(2)}</td>
            `;
            rowsEl.appendChild(row);
          });
        } catch (error) {
          msg.className = "text-danger mb-0";
          msg.textContent = error.message;
        }
      }

      loadBookings();
    </script>
  </body>
</html>
