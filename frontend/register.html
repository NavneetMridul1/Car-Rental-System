<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css?v=4" />
  </head>
  <body>
    <div class="app-container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="brand-title h3 m-0">Car Rental - Register</h1>
        <a class="btn btn-outline-primary" href="./login.html">Login</a>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="card card-soft p-4">
            <h2 class="h5">Customer Registration</h2>
            <form id="customerForm" class="mt-3">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Register as Customer</button>
            </form>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card card-soft p-4">
            <h2 class="h5">Agency Registration</h2>
            <form id="agencyForm" class="mt-3">
              <div class="mb-3">
                <label class="form-label">Agency Name</label>
                <input class="form-control" name="name" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required />
              </div>
              <button class="btn btn-dark w-100" type="submit">Register as Agency</button>
            </form>
          </div>
        </div>
      </div>
      <p id="message" class="mt-3"></p>
    </div>

    <script src="./js/api.js"></script>
    <script>
      const msgEl = document.getElementById("message");

      async function handleSubmit(event, role) {
        event.preventDefault();
        msgEl.textContent = "";

        const formData = new FormData(event.target);
        const payload = {
          name: formData.get("name"),
          email: formData.get("email"),
          password: formData.get("password"),
          role
        };

        try {
          await apiFetch("/auth/register", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          msgEl.className = "text-success mt-3";
          msgEl.textContent = `${role} registered successfully. You can login now.`;
          event.target.reset();
        } catch (error) {
          msgEl.className = "text-danger mt-3";
          msgEl.textContent = error.message;
        }
      }

      document.getElementById("customerForm").addEventListener("submit", (e) => handleSubmit(e, "CUSTOMER"));
      document.getElementById("agencyForm").addEventListener("submit", (e) => handleSubmit(e, "AGENCY"));
    </script>
  </body>
</html>
